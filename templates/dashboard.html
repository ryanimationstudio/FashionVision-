<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dashboard — FashionVision</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#FF8C00', base: '#F4F4F4', dark: '#000000' },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      background: #f2f2f2;
      color: #111;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
    }

    #drop-zone.dragover {
      border-color: #FF8C00;
      background: rgba(255, 140, 0, 0.05);
    }

    #gravity-bin {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #side-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 400px;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      z-index: 100;
    }

    #side-panel.open {
      transform: translateX(0);
    }

    .tag-chip {
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 99px;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      75% {
        transform: translateX(8px);
      }
    }

    .animate-shake {
      animation: shake 0.4s ease-in-out;
      border-color: #ef4444 !important;
      background: rgba(239, 68, 68, 0.05) !important;
    }

    .glow-aura {
      box-shadow: 0 0 60px rgba(255, 140, 0, 0.2);
      transition: box-shadow 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── MOODBOARD STYLES ── */
    #mb-elements-stage .mb-element {
      position: absolute;
      touch-action: none;
      user-select: none;
      cursor: grab;
      transition: outline 0.2s ease, box-shadow 0.2s ease;
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.05);
      width: 150px;
    }

    #mb-elements-stage .mb-element:active {
      cursor: grabbing;
      z-index: 1000 !important;
    }

    #mb-elements-stage .mb-element img {
      pointer-events: none;
      width: 100%;
      height: 100%;
      border-radius: 6px;
      object-fit: cover;
    }

    #mb-elements-stage .mb-element.selected {
      outline: 2px solid #FF8C00;
      box-shadow: 0 20px 40px rgba(255, 140, 0, 0.15);
    }

    .mb-source-item {
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mb-source-item:hover {
      transform: scale(1.05);
      border-color: #FF8C00 !important;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.02);
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }
  </style>
</head>

<body
  class="antialiased selection:bg-brand selection:text-white min-h-screen flex flex-col relative overflow-x-hidden bg-white">

  <!-- Navigation: Master HUD -->
  <nav class="glass glass-nav">
    <!-- Left: Branding -->
    <div class="flex items-center flex-shrink-0">
      <a href="/dashboard" id="fv-logo">FV</a>
    </div>

    <!-- Center: Primary Nav -->
    <div class="nav-links-wrap">
      <a href="javascript:void(0)" id="nav-lab" class="active">Uploader</a>
      <a href="/history" id="nav-archive">Collection</a>
      <a href="javascript:void(0)" id="nav-moodboard">Moodboard</a>
      <a href="javascript:void(0)" id="runway-mode-btn">Runway</a>
      <a href="/analytics" id="nav-analytics">Analytics</a>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center flex-shrink-0">
      <a href="/logout" id="nav-logout">SIGN OUT</a>
    </div>
  </nav>

  <!-- Main Layout: Fluid Flow -->
  <div class="flex-grow flex flex-col lg:flex-row relative pt-16 lg:pt-20">
    <!-- Left: Upload Section (Top on mobile, Side on desktop) -->
    <div id="uploader-sidebar"
      class="w-full lg:w-[450px] flex-none p-6 lg:p-10 pb-10 flex flex-col relative z-30 glass border-b lg:border-b-0 lg:border-r-[0.5px] border-black/5 shadow-xl">

      <div id="status-text"
        class="reveal hidden w-full mb-6 text-[10px] font-black uppercase tracking-[0.2em] text-center break-words leading-relaxed p-4 rounded-xl shadow-lg border bg-white/90 backdrop-blur-md z-[100] transition-all">
        Processing...
      </div>

      <div class="mb-6 lg:mb-8 mt-2 lg:mt-4 reveal">
        <h1 class="text-3xl lg:text-5xl font-black tracking-tighter uppercase mb-2 text-black leading-tight">Uploader
        </h1>
        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest leading-6 opacity-70">Clean Scan &
          Auto-Tagging.</p>
      </div>

      <div id="drop-zone"
        class="glass rounded-3xl flex-grow border-2 border-dashed border-black/5 flex flex-col items-center justify-center p-5 text-center transition-all cursor-pointer group hover:bg-white/40">
        <input type="file" id="file-input" class="hidden" accept=".jpg,.jpeg,.png,.webp">

        <div id="upload-default">
          <svg class="w-10 h-10 text-gray-400 mx-auto mb-4 group-hover:text-brand transition-colors" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
          </svg>
          <p class="text-sm font-semibold uppercase tracking-widest mb-1 group-hover:text-brand transition-colors">
            Select Image</p>
          <p class="text-[10px] text-gray-400 uppercase tracking-widest">Drop here or click</p>
        </div>

        <div id="upload-preview-wrap" class="hidden w-full flex-col items-center group/glow">
          <div
            class="w-full h-80 relative mb-4 overflow-hidden rounded-xl bg-gray-100/40 shadow-inner border border-black/5 flex items-center justify-center transition-all duration-700 group-[.glow-active]/glow:glow-aura">
            <img id="upload-preview-blur" src=""
              class="absolute inset-0 w-full h-full object-cover blur-xl opacity-60 scale-110 pointer-events-none">
            <img id="upload-preview" src="" class="relative z-10 w-full h-full object-contain pointer-events-none">
          </div>
          <div class="w-full flex-none mt-2">
            <button id="analyze-btn"
              class="relative w-full py-4 text-white text-[10px] font-bold uppercase tracking-widest rounded-full transition-all bg-gradient-to-r from-[#FF007F] to-[#FF8C00] shadow-[0_4px_20px_rgba(255,0,127,0.3)] hover:shadow-[0_8px_30px_rgba(255,140,0,0.5)] active:scale-95 overflow-hidden">
              <span class="relative z-10">Scan Style</span>
            </button>
            <div class="text-center mt-3">
              <button id="clear-btn"
                class="text-[9px] text-gray-400 uppercase tracking-widest hover:text-black transition-colors font-bold">Reset</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Physics Workspace -->
    <div id="physics-container" class="flex-grow relative bg-transparent min-h-[400px] lg:min-h-0">
      <div id="gravity-bin"></div>
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03]">
        <h2 class="text-4xl lg:text-8xl font-black uppercase tracking-tighter">Your Collection</h2>
      </div>
    </div>

    <!-- NEW: Moodboard Canvas (Hidden by default) -->
    <div id="moodboard-container" class="hidden flex-grow flex flex-col lg:flex-row relative bg-[#f9f9f9] h-full overflow-hidden">
      <!-- MB Sidebar: Draggable Items (Responsive Layout) -->
      <div
        class="absolute lg:relative lg:ml-6 my-4 lg:my-6 w-full lg:w-72 h-[180px] lg:h-auto bottom-0 lg:bottom-auto glass rounded-t-[40px] lg:rounded-[40px] z-40 p-5 flex lg:flex-col shadow-2xl border border-black/5 overflow-hidden">
        <div class="flex flex-col w-full h-full">
          <h4 class="text-[9px] font-black uppercase tracking-[0.2em] mb-4 text-brand text-center lg:text-left">Your Archive</h4>
          <div id="mb-items-list" class="flex lg:flex-col overflow-x-auto lg:overflow-y-auto gap-4 pr-2 custom-scrollbar pb-2 lg:pb-0 h-full">
            <!-- Items will be injected here -->
          </div>
        </div>
      </div>

      <!-- MB Main Area -->
      <div id="mb-canvas" class="relative flex-grow pointer-events-auto overflow-hidden">
        <div class="absolute inset-0 opacity-[0.05] pointer-events-none"
          style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 30px 30px;"></div>
        <div id="mb-elements-stage" class="absolute inset-0"></div>

        <div class="absolute bottom-8 right-8 flex gap-3 z-50">
          <button id="mb-clear-btn"
            class="px-6 py-3 bg-white/80 backdrop-blur-md border border-black/10 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all shadow-lg">Clear
            All</button>
          <button id="mb-save-btn"
            class="px-8 py-3 bg-brand text-white rounded-full text-[10px] font-bold uppercase tracking-widest hover:scale-105 transition-all shadow-xl shadow-brand/20">Save
            Outfit</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sliding Metadata Panel -->
  <div id="side-panel"
    class="glass border-l border-gray-200 p-6 lg:p-8 flex flex-col shadow-2xl w-full sm:w-[400px] right-0 translate-x-full fixed inset-y-0 transition-transform duration-500 z-[100]">
    <button id="close-panel"
      class="absolute top-6 right-6 text-3xl font-light text-gray-400 hover:text-black leading-none transition-colors">&times;</button>
    <h3 class="text-[10px] text-[#FF007F] font-bold tracking-widest uppercase mb-6">Item Details</h3>
    <div class="mb-6 flex-grow overflow-y-auto pr-2">
      <div class="w-full h-48 mb-6 overflow-hidden rounded-2xl bg-gray-50 border border-black/5">
        <img id="panel-report-img" class="w-full h-full object-cover" src="">
      </div>
      <h2 id="panel-title" class="font-serif text-2xl font-bold uppercase tracking-tight mb-4">Title</h2>
      <p id="panel-desc" class="text-sm text-gray-600 leading-relaxed mb-6 font-medium">Description will appear here...
      </p>
      <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 border-b border-gray-200 pb-2">
        Style Tags</h4>
      <div id="panel-attributes" class="flex flex-wrap gap-2 mb-8"></div>
      <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 border-b border-gray-200 pb-2">
        Search Hashtags</h4>
      <div id="panel-hashtags" class="flex flex-wrap gap-1 text-[10px] text-gray-500 tracking-wide font-mono mb-8">
      </div>

      <!-- ── NEW: SCHEDULING UNIT ── -->
      <div class="mt-4 pt-6 border-t border-gray-200">
        <button id="toggle-schedule"
          class="w-full py-3 border border-black/10 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all mb-4">
          📅 Schedule Content
        </button>

        <div id="schedule-form-wrap" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div id="schedule-alert" class="text-[9px] mb-4 p-3 rounded-lg hidden"></div>

          <form id="schedule-form" class="space-y-4">
            <div>
              <label class="text-[9px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Post Title</label>
              <input id="sch-title" type="text"
                class="w-full bg-gray-50 border border-black/5 rounded-xl px-4 py-3 text-xs focus:ring-1 focus:ring-brand outline-none"
                placeholder="Enter title" required>
            </div>

            <div>
              <label class="text-[9px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Category</label>
              <input id="sch-board" type="text"
                class="w-full bg-gray-50 border border-black/5 rounded-xl px-4 py-3 text-xs focus:ring-1 focus:ring-brand outline-none"
                placeholder="e.g. Streetwear">
            </div>

            <div>
              <label
                class="text-[9px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Description</label>
              <textarea id="sch-description" rows="3"
                class="w-full bg-gray-50 border border-black/5 rounded-xl px-4 py-3 text-xs focus:ring-1 focus:ring-brand outline-none resize-none"
                placeholder="Editorial caption..."></textarea>
            </div>

            <div>
              <label class="text-[9px] font-black uppercase text-gray-400 tracking-widest mb-2 block">Release
                Time</label>
              <input id="sch-time" type="datetime-local"
                class="w-full bg-gray-50 border border-black/5 rounded-xl px-4 py-3 text-xs focus:ring-1 focus:ring-brand outline-none"
                required>
            </div>

            <button type="submit" id="schedule-submit-btn"
              class="w-full py-4 bg-black text-white text-[10px] font-bold uppercase tracking-widest rounded-xl hover:bg-brand transition-all shadow-lg">
              Confirm Schedule
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/ethereal_dashboard.js"></script>
  <script type="module" src="/static/js/moodboard.js"></script>
  <script src="/static/js/runway_mode.js"></script>
  <script>
    // --- 📽️ Scroll Reveal Logic ---
    const observerOptions = { threshold: 0.1 };
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
        }
      });
    }, observerOptions);

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    // Trigger initial reveal immediately for critical UI
    document.querySelectorAll('.reveal').forEach(el => {
      el.classList.add('active');
      el.style.opacity = "1";
      el.style.transform = "translateY(0)";
    });

    // ── Runway Mode Integration ──
    document.getElementById("runway-mode-btn")?.addEventListener("click", async () => {
      const token = localStorage.getItem("fv_token");
      if (!token) return;

      const statusText = document.getElementById("status-text");
      statusText.classList.remove("hidden");
      statusText.textContent = "SYNCHRONIZING RUNWAY ENGINE...";

      try {
        const res = await fetch("/api/history", { headers: { "Authorization": `Bearer ${token}` } });
        const data = await res.json();
        const items = (data.history || []).map(it => ({
          imageUrl: it.image_url,
          title: it.title || "Untitled",
          desc: it.description || "",
          style: it.style || "Modern",
          color: it.color || "Neutral"
        }));

        if (items.length) {
          window.RunwayMode.open(items);
        } else {
          alert("Archive empty. Upload something first!");
        }
      } catch (e) {
        alert("Runway synchronization failed.");
      } finally {
        statusText.classList.add("hidden");
      }
    });
  </script>
</body>

</html>
