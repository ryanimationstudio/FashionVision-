<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Identity Node // FashionVision</title>
  <meta name="description" content="Secure login access to your digital fashion archive.">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#EC4899', luxury: '#0a0a0f' },
          fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
        }
      }
    }
  </script>

  <style>
    /* UI/UX Tweaks */
    body {
      background-color: #000;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* Fix Auto-fill background styling (Browser Default Override) */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px rgba(255, 255, 255, 0.05) inset !important;
      -webkit-text-fill-color: white !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    /* Cinematic Fade-in Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* Custom Checkbox */
    .custom-checkbox {
      appearance: none;
      background-color: rgba(255, 255, 255, 0.1);
      margin: 0;
      font: inherit;
      color: currentColor;
      width: 1.15em;
      height: 1.15em;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.25em;
      display: grid;
      place-content: center;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
    }

    .custom-checkbox::before {
      content: "";
      width: 0.65em;
      height: 0.65em;
      transform: scale(0);
      transition: 120ms transform ease-in-out;
      box-shadow: inset 1em 1em white;
      background-color: white;
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    .custom-checkbox:checked {
      background-color: var(--brand);
      border-color: var(--brand);
    }

    .custom-checkbox:checked::before {
      transform: scale(1);
    }
  </style>
</head>

<body class="min-h-screen flex flex-col font-sans selection:bg-brand selection:text-white relative overflow-hidden">

  <div class="fixed inset-0 z-0 pointer-events-none">
    <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=1920&q=80"
      class="w-full h-full object-cover opacity-40 blur-xl scale-110 grayscale" alt="">
    <div class="absolute inset-0 bg-gradient-to-br from-black/80 via-black/50 to-black/90"></div>
  </div>

  <header
    class="fixed top-6 left-1/2 -translate-x-1/2 w-[92%] max-w-[1200px] h-16 bg-black/50 backdrop-blur-2xl border border-white/10 rounded-full flex items-center justify-between px-6 z-50 shadow-2xl">

    <a href="/"
      class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center font-serif font-black text-sm tracking-tight transition-transform active:scale-95 hover:shadow-[0_0_15px_rgba(255,255,255,0.4)]"
      aria-label="Home">FV</a>

    <div
      class="text-[9px] font-black uppercase tracking-[0.4em] text-white/50 hidden sm:flex items-center absolute left-1/2 -translate-x-1/2">
      <span class="inline-block w-2 h-2 rounded-full bg-brand animate-pulse mr-2"></span>
      Secure Node
    </div>

    <a href="/signup"
      class="text-[9px] font-black uppercase tracking-[0.2em] text-white/60 hover:text-white transition-colors flex items-center gap-2 group">
      Enroll Now
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        class="transition-transform group-hover:translate-x-1">
        <path d="M5 12h14M12 5l7 7-7 7" />
      </svg>
    </a>
  </header>

  <main class="grow flex items-center justify-center p-6 pt-32 relative z-10">
    <div
      class="w-full max-w-[420px] bg-white/10 backdrop-blur-3xl border border-white/10 p-8 sm:p-12 rounded-[32px] shadow-[0_45px_100px_-30px_rgba(0,0,0,0.8)] animate-fade-in relative overflow-hidden">

      <div class="absolute -top-24 -right-24 w-48 h-48 bg-brand/20 blur-[80px] rounded-full pointer-events-none"></div>

      <div class="mb-10 relative z-10">
        <h1 class="font-serif text-4xl font-black italic tracking-tighter text-white leading-none mb-2">Studio <span
            class="text-white/40">Access</span></h1>
        <p class="text-[10px] font-bold text-white/40 uppercase tracking-[0.2em]">Identify yourself for workspace
          access.</p>
      </div>

      <div id="auth-alert"
        class="hidden mb-6 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest border backdrop-blur-md flex items-start gap-3 transition-all">
        <span id="alert-icon" class="mt-0.5 flex-shrink-0"></span>
        <span id="alert-text" class="leading-relaxed"></span>
      </div>

      <form id="login-form" class="space-y-6 relative z-10" novalidate>

        <div class="space-y-2">
          <label for="login-email"
            class="block text-[9px] font-black uppercase tracking-[0.25em] text-white/50 ml-1 cursor-pointer">Identity
            Node (Email)</label>
          <input type="email" id="login-email" required
            class="w-full h-14 bg-white/5 rounded-2xl px-5 font-medium text-white outline-none focus:bg-white/10 focus:ring-2 focus:ring-white/30 border border-white/10 transition-all text-sm placeholder-white/20"
            placeholder="you@fashion.vision">
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-end mb-2">
            <label for="login-password"
              class="block text-[9px] font-black uppercase tracking-[0.25em] text-white/50 ml-1 cursor-pointer">Security
              Key</label>
            <a href="/forgot"
              class="text-[9px] font-bold text-white/50 hover:text-white transition-colors uppercase tracking-widest underline decoration-white/20 underline-offset-4">Forgot?</a>
          </div>
          <div class="relative group">
            <input type="password" id="login-password" required
              class="w-full h-14 bg-white/5 rounded-2xl pl-5 pr-12 font-medium text-white outline-none focus:bg-white/10 focus:ring-2 focus:ring-white/30 border border-white/10 transition-all text-sm placeholder-white/20"
              placeholder="••••••••">
            <button type="button" id="toggle-pwd"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition-colors focus:outline-none focus:text-white"
              aria-label="Toggle Password Visibility">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-center gap-3 pt-1">
          <input type="checkbox" id="remember-me" class="custom-checkbox">
          <label for="remember-me"
            class="text-[11px] font-medium text-white/60 hover:text-white transition-colors cursor-pointer select-none">Keep
            session active</label>
        </div>

        <button type="submit" id="btn-login"
          class="w-full h-16 mt-2 bg-white text-black active:scale-[0.98] transition-all duration-200 rounded-full flex items-center justify-center shadow-[0_10px_30px_-10px_rgba(255,255,255,0.2)] hover:shadow-[0_10px_40px_-10px_rgba(255,255,255,0.6)] relative overflow-hidden group focus:outline-none focus:ring-4 focus:ring-white/30">
          <span class="btn-text text-[10px] font-black uppercase tracking-[0.4em] z-10 transition-opacity">Access
            Dashboard</span>
          <div class="btn-loader hidden absolute inset-0 flex items-center justify-center z-10">
            <div class="w-5 h-5 border-2 border-black/20 border-t-black rounded-full animate-spin"></div>
          </div>
        </button>
      </form>

    </div>
  </main>

  <script type="module">
    import { saveSession, isAuthenticated } from "/static/js/auth.js";

    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('login-email');
      const pwdInput = document.getElementById('login-password');
      const togglePwdBtn = document.getElementById('toggle-pwd');
      const eyeIcon = document.getElementById('eye-icon');
      const alertBox = document.getElementById('auth-alert');
      const alertText = document.getElementById('alert-text');
      const alertIcon = document.getElementById('alert-icon');
      const btn = document.getElementById('btn-login');
      const btnText = btn.querySelector('.btn-text');
      const btnLoader = btn.querySelector('.btn-loader');

      // UI/UX Logic: Check for server-side expiry signal
      const params = new URLSearchParams(window.location.search);
      if (params.get("session_expired") === "1") {
        showAlert("Access expired. Please re-identify yourself for security.", "error");
      }

      // UI/UX Focus: Clear alert on user typing
      [emailInput, pwdInput].forEach(input => {
        input.addEventListener('input', () => {
          if (!alertBox.classList.contains('hidden')) {
            alertBox.classList.add('hidden');
          }
        });
      });

      // UI/UX Focus: Password Visibility Toggle
      togglePwdBtn.addEventListener('click', () => {
        const isPwd = pwdInput.type === 'password';
        pwdInput.type = isPwd ? 'text' : 'password';
        eyeIcon.innerHTML = isPwd
          ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
          : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      });

      function showAlert(msg, type = 'error') {
        alertBox.classList.remove('hidden', 'bg-red-500/20', 'border-red-500/50', 'text-red-200', 'bg-green-500/20', 'border-green-500/50', 'text-green-200');
        if (type === 'error') {
          alertBox.classList.add('bg-red-500/20', 'border-red-500/50', 'text-red-200');
          alertIcon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
          form.parentElement.animate([
            { transform: 'translateX(0)' }, { transform: 'translateX(-5px)' }, { transform: 'translateX(5px)' },
            { transform: 'translateX(-5px)' }, { transform: 'translateX(5px)' }, { transform: 'translateX(0)' }
          ], { duration: 400, easing: 'ease-in-out' });
        } else {
          alertBox.classList.add('bg-green-500/20', 'border-green-500/50', 'text-green-200');
          alertIcon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
        }
        alertText.textContent = msg;
      }

      function setLoading(isLoading) {
        btn.disabled = isLoading;
        if (isLoading) {
          btnText.classList.add('opacity-0');
          btnLoader.classList.remove('hidden');
        } else {
          btnText.classList.remove('opacity-0');
          btnLoader.classList.add('hidden');
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = pwdInput.value;

        if (!email || !password) return showAlert("Identity Node and Security Key are required.");

        setLoading(true);
        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();

          if (res.ok) {
            saveSession(data.access_token, data.user);
            showAlert("Access Granted. Initializing Workspace...", "success");
            btn.classList.add('bg-green-500', 'text-white');
            btnText.innerHTML = "REDIRECTING...";
            setTimeout(() => window.location.replace("/dashboard"), 1000);
          } else {
            showAlert(data.error || "Identity Rejection. Access denied.");
            setLoading(false);
          }
        } catch (err) {
          showAlert("Network connection failure. Node unreachable.");
          setLoading(false);
        }
      });
    });
  </script>
</body>

</html>
